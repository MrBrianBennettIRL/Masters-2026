function norm(n){
  return n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z\s.]/g,"").replace(/\s+/g," ").trim();
}
function fmt(s){
  if(s===MC)return"MC";
  if(s===null||s===undefined)return"—";
  return""+s;
}
function scoreClass(s){
  if(s===null||s===undefined)return"sc-muted";
  if(s===MC)return"sc-red";
  if(s<=5)return"sc-green";
  if(s<=20)return"sc-lime";
  if(s<=50)return"sc-white";
  return"sc-orange";
}

let scores={}, loading=false, lastUpdated=null, countdown=180, expandedId=null;

function getScore(name){
  const k=norm(name);
  return scores[k]!==undefined?scores[k]:null;
}

async function fetchScores(){
  if(loading)return;
  loading=true;
  document.getElementById("refresh-btn").disabled=true;
  document.getElementById("refresh-btn").textContent="FETCHING...";
  document.getElementById("error-msg").style.display="none";
  document.getElementById("loading").style.display=Object.keys(scores).length===0?"block":"none";
  try{
    const res=await fetch("/api/scores");
    if(!res.ok)throw new Error("API returned "+res.status);
    const data=await res.json();
    if(data.error) throw new Error(data.error + (data.attempts ? " ("+data.attempts.join(", ")+")" : ""));
    const map={};

    if(data.source==="masters" && data.data){
      // Masters.com format
      const players=data.data?.data?.leaderboard?.players||data.data?.players||[];
      players.forEach((p,idx)=>{
        const name=p.full_name||p.player_bio?.first_name+" "+p.player_bio?.last_name||"";
        if(!name.trim())return;
        const status=(p.status||"").toLowerCase();
        const pos=parseInt(p.position)||idx+1;
        const isCut=status.includes("cut")||status.includes("wd")||status.includes("withdraw");
        map[norm(name)]=(isCut||pos>100)?MC:pos;
      });
      const badge=document.getElementById("round-badge");
      const round=data.data?.data?.leaderboard?.current_round;
      if(round){badge.textContent="R"+round;badge.style.display="inline";}
    } else {
      // ESPN format
      const competition=data.events?.[0]?.competitions?.[0];
      const competitors=competition?.competitors||[];
      if(!competitors.length)throw new Error("No competitor data found");
      const period=competition?.status?.period;
      const badge=document.getElementById("round-badge");
      if(period){badge.textContent="R"+period;badge.style.display="inline";}
      let assignedPos=1;
      competitors.forEach((c,idx)=>{
        const name=c.athlete?.displayName||"";
        if(!name)return;
        const st=(c.status?.type?.name||"").toUpperCase();
        const isCut=st.includes("CUT")||st.includes("WITHDRAW")||st.includes("DISQUALIF");
        let pos;
        if(idx===0){pos=1;assignedPos=1;}
        else{
          const prev=competitors[idx-1]?.score;
          const curr=c.score;
          if(curr===prev&&!isCut){pos=assignedPos;}
          else{assignedPos=idx+1;pos=assignedPos;}
        }
        map[norm(name)]=(isCut||pos>100)?MC:pos;
      });
    }
    scores=map;
    lastUpdated=new Date();
    countdown=180;
    document.getElementById("last-updated").textContent="Updated "+lastUpdated.toLocaleTimeString()+" · next in 3:00";
  }catch(e){
    const el=document.getElementById("error-msg");
    el.textContent="Could not fetch scores: "+e.message;
    el.style.display="inline-block";
  }
  loading=false;
  document.getElementById("refresh-btn").disabled=false;
  document.getElementById("refresh-btn").textContent="↻ REFRESH";
  document.getElementById("loading").style.display="none";
  render();
}

function computeRankings(){
  return PARTICIPANTS.map(p=>{
    const ps=p.picks.map(name=>({name,score:getScore(name)}));
    const known=ps.filter(x=>x.score!==null);
    const sorted=[...known].sort((a,b)=>a.score-b.score);
    const best5=sorted.slice(0,5);
    const best5names=best5.map(x=>norm(x.name));
    const total=known.length>=5?best5.reduce((s,x)=>s+x.score,0):null;
    return{...p,ps,best5names,total};
  }).sort((a,b)=>{
    if(a.total===null&&b.total===null)return 0;
    if(a.total===null)return 1;
    if(b.total===null)return -1;
    return a.total-b.total;
  }).map((p,i,arr)=>{
    if(p.total===null)return{...p,pos:"—"};
    const first=arr.findIndex(x=>x.total===p.total);
    const tied=arr.filter(x=>x.total===p.total).length>1;
    return{...p,pos:tied?"T"+(first+1):""+(first+1)};
  });
}

function render(){
  const ranked=computeRankings();
  const board=document.getElementById("board");
  if(!board)return;
  let html=`<div class="col-headers"><span>POS</span><span>ENTRANT</span><span class="right">SCORE</span><span></span></div>`;
  ranked.forEach((p,idx)=>{
    const isOpen=expandedId===p.id;
    const topClass=idx===0?"top1":idx===1?"top2":idx===2?"top3":idx%2===0?"even":"";
    html+=`<div>
      <div class="row ${topClass}" onclick="toggle(${p.id})">
        <span class="pos">${p.pos}</span>
        <span class="name">${p.name}</span>
        <span class="score ${scoreClass(p.total)}">${fmt(p.total)}</span>
        <span class="toggle">${isOpen?"▲":"▼"}</span>
      </div>
      <div class="picks ${isOpen?"open":""}">
        <div class="picks-label">PICKS (★ = counts toward score)</div>
        ${p.ps.map(ps=>{
          const counts=p.best5names.includes(norm(ps.name));
          return`<div class="pick-row">
            <span class="pick-star" style="color:${counts?"#C9A537":"#2D5E3A"}">${counts?"★":"·"}</span>
            <span class="pick-name" style="color:${counts?"#F5F0E0":"#4A7A5A"}">${ps.name}</span>
            <span class="pick-score ${scoreClass(ps.score)}">${fmt(ps.score)}</span>
          </div>`;
        }).join("")}
        <div class="picks-total"><span>Best 5 total:</span><strong class="${scoreClass(p.total)}">${fmt(p.total)}</strong></div>
      </div>
    </div>`;
  });
  board.innerHTML=html;
}

function toggle(id){
  expandedId=expandedId===id?null:id;
  render();
}

// Countdown ticker
setInterval(()=>{
  if(countdown>0){
    countdown--;
    const el=document.getElementById("last-updated");
    if(lastUpdated&&el){
      const m=Math.floor(countdown/60);
      const s=String(countdown%60).padStart(2,"0");
      el.textContent="Updated "+lastUpdated.toLocaleTimeString()+" · next in "+m+":"+s;
    }
  }
},1000);

// Auto-refresh every 3 minutes
setInterval(fetchScores, 3*60*1000);

// Initial load
fetchScores();
</script>
